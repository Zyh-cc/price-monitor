<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#080B16">
<meta name="format-detection" content="telephone=no">
<title>国际行情监控</title>
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📈</text></svg>">
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700;800&family=Noto+Sans+SC:wght@400;500;600;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html {
    /* iOS safe area support */
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
    padding-left: env(safe-area-inset-left);
    padding-right: env(safe-area-inset-right);
  }

  body {
    min-height: 100vh;
    min-height: -webkit-fill-available;
    background: linear-gradient(145deg, #080B16 0%, #0D1224 40%, #111833 100%);
    font-family: 'Noto Sans SC', -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    color: #E0E6F0;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    /* Prevent pull-to-refresh on mobile */
    overscroll-behavior-y: contain;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 50px 50px;
    pointer-events: none;
    z-index: 0;
  }

  .orb {
    position: fixed; border-radius: 50%; pointer-events: none; z-index: 0;
  }
  .orb-gold {
    top: -5%; left: -10%; width: 300px; height: 300px;
    background: radial-gradient(circle, rgba(255,193,7,0.08), transparent 70%);
    filter: blur(40px);
  }
  .orb-blue {
    bottom: -5%; right: -10%; width: 280px; height: 280px;
    background: radial-gradient(circle, rgba(0,150,255,0.08), transparent 70%);
    filter: blur(40px);
  }

  .container {
    max-width: 980px;
    margin: 0 auto;
    padding: 20px 16px 40px;
    position: relative;
    z-index: 1;
  }

  /* ===== Header ===== */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 20px;
    animation: fadeInUp 0.5s ease-out;
  }
  .header h1 {
    font-size: 22px;
    font-weight: 800;
    background: linear-gradient(135deg, #F0F4FF, #8EA4CC);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    white-space: nowrap;
  }
  .header .subtitle {
    font-size: 11px;
    color: #5A6B8A;
    font-weight: 500;
    margin-top: 3px;
  }
  .status-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(18,22,36,0.8);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-radius: 12px;
    padding: 8px 12px;
    border: 1px solid rgba(255,255,255,0.06);
    flex-shrink: 0;
  }
  .pulse-dot {
    width: 8px; height: 8px; border-radius: 50%; background: #00E676;
    position: relative; animation: pulse 2s ease-in-out infinite;
    flex-shrink: 0;
  }
  .pulse-dot::after {
    content: ''; position: absolute; inset: -3px; border-radius: 50%;
    background: rgba(0,230,118,0.25); animation: pulse 2s ease-in-out infinite 0.3s;
  }
  .status-label { font-size: 11px; color: #6B7A99; font-weight: 500; display: none; }
  .status-time {
    font-size: 12px; font-family: 'JetBrains Mono', monospace;
    color: #8EA4CC; font-weight: 600;
  }

  /* ===== Cards ===== */
  .cards {
    display: flex;
    flex-direction: column;
    gap: 16px;
    animation: fadeInUp 0.6s ease-out;
  }

  .card {
    background: rgba(18,22,36,0.9);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: 18px;
    padding: 20px 18px 16px;
    position: relative;
    overflow: hidden;
    /* No hover transform on mobile - use active state instead */
    transition: transform 0.15s;
  }
  .card:active { transform: scale(0.985); }
  .card-gold { border: 1px solid rgba(255,213,79,0.12); }
  .card-oil { border: 1px solid rgba(66,165,245,0.12); }

  .card-glow {
    position: absolute; top: -50px; right: -50px; width: 130px; height: 130px;
    border-radius: 50%; pointer-events: none;
  }
  .card-gold .card-glow { background: radial-gradient(circle, rgba(255,213,79,0.1), transparent); }
  .card-oil .card-glow { background: radial-gradient(circle, rgba(66,165,245,0.1), transparent); }

  .card-header {
    display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px;
  }
  .card-title-group { display: flex; align-items: center; gap: 10px; }
  .card-icon { font-size: 28px; }
  .card-name { font-size: 14px; font-weight: 600; color: #E0E6F0; letter-spacing: 0.01em; }
  .card-unit { font-size: 11px; color: #6B7A99; margin-top: 1px; }

  .badge {
    display: flex; align-items: center; gap: 3px; padding: 4px 10px;
    border-radius: 16px; font-size: 12px; font-weight: 700;
    font-family: 'JetBrains Mono', monospace; flex-shrink: 0;
  }

  .price-value {
    font-size: 36px; font-weight: 800; color: #F0F4FF;
    font-family: 'JetBrains Mono', monospace; letter-spacing: -0.02em;
    line-height: 1; margin-bottom: 5px;
  }
  .price-change {
    font-size: 13px; font-family: 'JetBrains Mono', monospace;
    font-weight: 600; margin-bottom: 16px;
  }

  .chart-container { width: 100%; height: 100px; }
  .chart-container canvas { width: 100%; height: 100%; display: block; }

  .stats-row {
    display: flex; justify-content: space-between; margin-top: 14px;
    padding: 12px 0 4px; border-top: 1px solid rgba(255,255,255,0.06);
  }
  .stat { text-align: center; flex: 1; }
  .stat-label { font-size: 10px; color: #5A6B8A; margin-bottom: 4px; font-weight: 500; }
  .stat-value { font-size: 13px; font-family: 'JetBrains Mono', monospace; font-weight: 600; color: #B0BCD5; }
  .stat-high { color: #00E676; }
  .stat-low { color: #FF5252; }

  /* ===== Period History Section ===== */
  .period-section {
    margin-top: 14px; padding-top: 14px;
    border-top: 1px solid rgba(255,255,255,0.06);
  }
  .period-section-title {
    font-size: 11px; color: #5A6B8A; font-weight: 600; margin-bottom: 10px;
    letter-spacing: 0.05em;
  }
  .period-tabs {
    display: flex; gap: 6px; margin-bottom: 12px;
    /* Allow horizontal scroll on very narrow screens */
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    -ms-overflow-style: none;
  }
  .period-tabs::-webkit-scrollbar { display: none; }
  .period-tab {
    padding: 7px 16px; border-radius: 10px; font-size: 13px; font-weight: 600;
    color: #5A6B8A; background: rgba(255,255,255,0.04); border: 1px solid transparent;
    cursor: pointer; transition: all 0.2s; font-family: 'Noto Sans SC', sans-serif;
    user-select: none; white-space: nowrap; flex-shrink: 0;
    /* Better touch target */
    min-height: 36px;
    display: flex; align-items: center; justify-content: center;
  }
  .period-tab:active { transform: scale(0.95); }
  .period-tab.active-gold { color: #FFD54F; background: rgba(255,213,79,0.15); border-color: rgba(255,213,79,0.3); }
  .period-tab.active-oil { color: #42A5F5; background: rgba(66,165,245,0.15); border-color: rgba(66,165,245,0.3); }

  .history-chart-container { width: 100%; height: 80px; margin-bottom: 10px; }
  .history-chart-container canvas { width: 100%; height: 100%; display: block; }

  .history-stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
  }
  .history-stat {
    text-align: center; padding: 10px 4px;
    background: rgba(255,255,255,0.03); border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.04);
  }
  .history-stat-label { font-size: 10px; color: #5A6B8A; margin-bottom: 4px; font-weight: 500; }
  .history-stat-value { font-size: 12px; font-family: 'JetBrains Mono', monospace; font-weight: 700; }
  .history-stat-sub { font-size: 9px; font-family: 'JetBrains Mono', monospace; color: #5A6B8A; margin-top: 2px; }

  /* ===== Info bar ===== */
  .info-bar {
    margin-top: 20px; display: flex; justify-content: center; gap: 20px;
    padding: 14px 16px; background: rgba(18,22,36,0.6); backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-radius: 14px; border: 1px solid rgba(255,255,255,0.04);
    animation: fadeInUp 0.8s ease-out; flex-wrap: wrap;
  }
  .info-item { display: flex; align-items: center; gap: 6px; }
  .info-label { font-size: 11px; color: #5A6B8A; }
  .info-value { font-size: 12px; font-family: 'JetBrains Mono', monospace; color: #8EA4CC; font-weight: 600; }
  .info-green { color: #00E676; }

  .disclaimer {
    text-align: center; font-size: 10px; color: #3A4560; margin-top: 20px; line-height: 1.6;
    padding-bottom: env(safe-area-inset-bottom, 0px);
  }

  /* ===== Last updated indicator ===== */
  .update-flash {
    position: fixed;
    top: env(safe-area-inset-top, 8px);
    left: 50%;
    transform: translateX(-50%) translateY(-40px);
    background: rgba(0,230,118,0.15);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(0,230,118,0.2);
    border-radius: 20px;
    padding: 6px 16px;
    font-size: 11px;
    color: #00E676;
    font-weight: 600;
    z-index: 100;
    opacity: 0;
    transition: transform 0.3s ease, opacity 0.3s ease;
    pointer-events: none;
  }
  .update-flash.show {
    transform: translateX(-50%) translateY(8px);
    opacity: 1;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(1.5); }
  }
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ===== Tablet & Desktop ===== */
  @media (min-width: 600px) {
    .container { padding: 32px 24px 50px; }
    .header h1 { font-size: 28px; }
    .status-label { display: inline; }
    .cards {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }
    .card { padding: 24px 24px 18px; }
    .card:hover { transform: translateY(-4px); }
    .card:active { transform: translateY(-4px); }
    .card-gold:hover { box-shadow: 0 20px 60px rgba(255,213,79,0.1); }
    .card-oil:hover { box-shadow: 0 20px 60px rgba(66,165,245,0.1); }
    .price-value { font-size: 40px; }
    .info-bar { gap: 32px; }
    .update-flash { display: none; }
  }

  /* ===== Very small screens (iPhone SE etc.) ===== */
  @media (max-width: 360px) {
    .container { padding: 16px 12px 32px; }
    .header h1 { font-size: 19px; }
    .price-value { font-size: 30px; }
    .card { padding: 16px 14px 14px; border-radius: 16px; }
    .card-icon { font-size: 24px; }
    .card-name { font-size: 13px; }
    .badge { font-size: 11px; padding: 3px 8px; }
    .period-tab { padding: 6px 12px; font-size: 12px; min-height: 32px; }
    .history-stat-value { font-size: 10px; }
    .history-stat { padding: 8px 2px; }
    .stat-value { font-size: 12px; }
    .info-bar { gap: 12px; padding: 12px; }
  }
</style>
</head>
<body>

<div class="orb orb-gold"></div>
<div class="orb orb-blue"></div>

<div class="update-flash" id="update-flash">价格已更新</div>

<div class="container">
  <div class="header">
    <div>
      <h1>国际行情监控</h1>
      <div class="subtitle">实时追踪 · 现货黄金 & 布伦特原油</div>
    </div>
    <div class="status-bar">
      <div class="pulse-dot"></div>
      <span class="status-label">实时更新</span>
      <span class="status-time" id="clock"></span>
    </div>
  </div>

  <div class="cards">
    <!-- Gold Card -->
    <div class="card card-gold">
      <div class="card-glow"></div>
      <div class="card-header">
        <div class="card-title-group">
          <span class="card-icon">🥇</span>
          <div>
            <div class="card-name">国际现货黄金 XAU/USD</div>
            <div class="card-unit">USD/盎司 (oz)</div>
          </div>
        </div>
        <div class="badge" id="gold-badge">--</div>
      </div>
      <div class="price-value" id="gold-price">--</div>
      <div class="price-change" id="gold-change">--</div>
      <div class="chart-container"><canvas id="gold-chart"></canvas></div>
      <div class="stats-row">
        <div class="stat"><div class="stat-label">开盘</div><div class="stat-value" id="gold-open">--</div></div>
        <div class="stat"><div class="stat-label">最高</div><div class="stat-value stat-high" id="gold-high">--</div></div>
        <div class="stat"><div class="stat-label">最低</div><div class="stat-value stat-low" id="gold-low">--</div></div>
      </div>
      <div class="period-section">
        <div class="period-section-title">📊 历史涨跌幅</div>
        <div class="period-tabs" id="gold-tabs"></div>
        <div class="history-chart-container"><canvas id="gold-history-chart"></canvas></div>
        <div class="history-stats" id="gold-history-stats"></div>
      </div>
    </div>

    <!-- Oil Card -->
    <div class="card card-oil">
      <div class="card-glow"></div>
      <div class="card-header">
        <div class="card-title-group">
          <span class="card-icon">🛢️</span>
          <div>
            <div class="card-name">布伦特原油 Brent</div>
            <div class="card-unit">USD/bbl</div>
          </div>
        </div>
        <div class="badge" id="oil-badge">--</div>
      </div>
      <div class="price-value" id="oil-price">--</div>
      <div class="price-change" id="oil-change">--</div>
      <div class="chart-container"><canvas id="oil-chart"></canvas></div>
      <div class="stats-row">
        <div class="stat"><div class="stat-label">开盘</div><div class="stat-value" id="oil-open">--</div></div>
        <div class="stat"><div class="stat-label">最高</div><div class="stat-value stat-high" id="oil-high">--</div></div>
        <div class="stat"><div class="stat-label">最低</div><div class="stat-value stat-low" id="oil-low">--</div></div>
      </div>
      <div class="period-section">
        <div class="period-section-title">📊 历史涨跌幅</div>
        <div class="period-tabs" id="oil-tabs"></div>
        <div class="history-chart-container"><canvas id="oil-history-chart"></canvas></div>
        <div class="history-stats" id="oil-history-stats"></div>
      </div>
    </div>
  </div>

  <div class="info-bar">
    <div class="info-item"><span class="info-label">刷新</span><span class="info-value">3秒</span></div>
    <div class="info-item"><span class="info-label">日期</span><span class="info-value" id="date-display"></span></div>
    <div class="info-item"><span class="info-label">状态</span><span class="info-value info-green">交易中</span></div>
  </div>

  <div class="disclaimer">⚠️ 数据为模拟演示，仅供参考，不构成投资建议<br>实际价格请以交易所报价为准</div>
</div>

<script>
// ========== Historical Period Data ==========
const periodData = {
  gold: {
    current: 5110.25,
    periods: {
      '1W':  { startPrice: 4920.00, high: 5434.00, low: 4880.50, label: '一周' },
      '1M':  { startPrice: 4780.00, high: 5434.00, low: 4700.00, label: '一个月' },
      '6M':  { startPrice: 3280.00, high: 5434.00, low: 3180.00, label: '六个月' },
      '1Y':  { startPrice: 2860.00, high: 5434.00, low: 2780.00, label: '一年' },
    }
  },
  oil: {
    current: 71.82,
    periods: {
      '1W':  { startPrice: 69.50, high: 73.20, low: 68.80, label: '一周' },
      '1M':  { startPrice: 74.60, high: 76.30, low: 68.20, label: '一个月' },
      '6M':  { startPrice: 78.40, high: 82.50, low: 67.80, label: '六个月' },
      '1Y':  { startPrice: 82.10, high: 88.60, low: 65.20, label: '一年' },
    }
  }
};

function generateHistoryCurve(startPrice, endPrice, high, low, points) {
  const data = [];
  const range = high - low;
  for (let i = 0; i < points; i++) {
    const t = i / (points - 1);
    const base = startPrice + (endPrice - startPrice) * t;
    const wave = Math.sin(t * Math.PI * 4.5) * range * 0.08
               + Math.sin(t * Math.PI * 11) * range * 0.03
               + (Math.random() - 0.5) * range * 0.04;
    data.push(+Math.max(low, Math.min(high, base + wave)).toFixed(2));
  }
  data[0] = startPrice;
  data[data.length - 1] = endPrice;
  return data;
}

const curveCache = {};
function getCurve(key, period) {
  const cacheKey = key + '-' + period;
  if (!curveCache[cacheKey]) {
    const pd = periodData[key].periods[period];
    const currentPrice = periodData[key].current;
    const pointsMap = { '1W': 35, '1M': 60, '6M': 90, '1Y': 120 };
    curveCache[cacheKey] = generateHistoryCurve(pd.startPrice, currentPrice, pd.high, pd.low, pointsMap[period] || 60);
  }
  return curveCache[cacheKey];
}

const activePeriod = { gold: '1W', oil: '1W' };

// ========== Realtime Price Engine ==========
const state = {
  gold: { current: 5110.25, open: 5085.60, high: 5138.70, low: 5072.30, history: [], color: '#FFD54F' },
  oil:  { current: 71.82, open: 72.15, high: 72.68, low: 71.30, history: [], color: '#42A5F5' }
};

function initHistory(base, volatility, count) {
  const arr = [];
  let p = base * (1 + (Math.random() - 0.5) * 0.02);
  for (let i = 0; i < count; i++) {
    p += (Math.random() - 0.48) * volatility;
    arr.push(+p.toFixed(2));
  }
  return arr;
}
state.gold.history = initHistory(5110, 3.5, 60);
state.oil.history = initHistory(71.8, 0.12, 60);

function tick(item, volatility) {
  const h = item.history;
  const momentum = h.length > 1 ? (h[h.length - 1] - h[h.length - 2]) * 0.3 : 0;
  const drift = (Math.random() - 0.48) * volatility;
  const newPrice = +(item.current + drift + momentum).toFixed(2);
  item.current = newPrice;
  item.high = Math.max(item.high, newPrice);
  item.low = Math.min(item.low, newPrice);
  if (h.length > 120) h.shift();
  h.push(newPrice);
}

// ========== Chart Drawing ==========
function drawChart(canvasId, data, color) {
  const canvas = document.getElementById(canvasId);
  if (!canvas || data.length < 2) return;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const w = canvas.clientWidth;
  const h = canvas.clientHeight;
  canvas.width = w * dpr;
  canvas.height = h * dpr;
  ctx.scale(dpr, dpr);

  const min = Math.min(...data);
  const max = Math.max(...data);
  const range = max - min || 1;
  const pad = 6;

  ctx.clearRect(0, 0, w, h);

  const grad = ctx.createLinearGradient(0, 0, 0, h);
  grad.addColorStop(0, color + '30');
  grad.addColorStop(1, color + '05');
  ctx.beginPath();
  data.forEach((p, i) => {
    const x = (i / (data.length - 1)) * w;
    const y = h - pad - ((p - min) / range) * (h - pad * 2);
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.lineTo(w, h); ctx.lineTo(0, h); ctx.closePath();
  ctx.fillStyle = grad; ctx.fill();

  ctx.beginPath();
  data.forEach((p, i) => {
    const x = (i / (data.length - 1)) * w;
    const y = h - pad - ((p - min) / range) * (h - pad * 2);
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.strokeStyle = color; ctx.lineWidth = 2; ctx.lineJoin = 'round'; ctx.stroke();

  const lastY = h - pad - ((data[data.length - 1] - min) / range) * (h - pad * 2);
  ctx.beginPath(); ctx.arc(w, lastY, 3, 0, Math.PI * 2); ctx.fillStyle = color; ctx.fill();
  ctx.beginPath(); ctx.arc(w, lastY, 6, 0, Math.PI * 2); ctx.fillStyle = color + '40'; ctx.fill();
}

// ========== UI ==========
function fmt(n) {
  return '$' + n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

// Mobile update flash
let flashTimer = null;
function showUpdateFlash() {
  const el = document.getElementById('update-flash');
  if (!el || window.innerWidth >= 600) return;
  el.classList.add('show');
  clearTimeout(flashTimer);
  flashTimer = setTimeout(() => el.classList.remove('show'), 1200);
}

function updateCard(key) {
  const d = state[key];
  const change = d.current - d.open;
  const pct = ((change / d.open) * 100).toFixed(2);
  const isUp = change >= 0;
  const arrow = isUp ? '▲' : '▼';
  const clr = isUp ? '#00E676' : '#FF5252';

  document.getElementById(key + '-price').textContent = fmt(d.current);

  const badge = document.getElementById(key + '-badge');
  badge.innerHTML = '<span style="font-size:9px">' + arrow + '</span> ' + pct + '%';
  badge.style.background = clr + '18';
  badge.style.color = clr;

  const chg = document.getElementById(key + '-change');
  chg.textContent = (isUp ? '+$' : '-$') + Math.abs(change).toFixed(2) + ' 今日';
  chg.style.color = clr;

  document.getElementById(key + '-open').textContent = fmt(d.open);
  document.getElementById(key + '-high').textContent = fmt(d.high);
  document.getElementById(key + '-low').textContent = fmt(d.low);

  drawChart(key + '-chart', d.history, d.color);
  periodData[key].current = d.current;
}

// ========== Period History ==========
function initPeriodTabs(key) {
  const tabsEl = document.getElementById(key + '-tabs');
  const periods = Object.keys(periodData[key].periods);
  const activeClass = key === 'gold' ? 'active-gold' : 'active-oil';

  periods.forEach(p => {
    const btn = document.createElement('button');
    btn.className = 'period-tab' + (activePeriod[key] === p ? (' ' + activeClass) : '');
    btn.textContent = periodData[key].periods[p].label;
    btn.onclick = () => {
      activePeriod[key] = p;
      tabsEl.querySelectorAll('.period-tab').forEach(b => b.className = 'period-tab');
      btn.className = 'period-tab ' + activeClass;
      delete curveCache[key + '-' + p];
      renderPeriodHistory(key);
    };
    tabsEl.appendChild(btn);
  });
}

function renderPeriodHistory(key) {
  const p = activePeriod[key];
  const pd = periodData[key].periods[p];
  const currentPrice = periodData[key].current;
  const color = state[key].color;

  const cacheKey = key + '-' + p;
  if (curveCache[cacheKey]) {
    curveCache[cacheKey][curveCache[cacheKey].length - 1] = currentPrice;
  }
  const curveData = getCurve(key, p);
  drawChart(key + '-history-chart', curveData, color);

  const change = currentPrice - pd.startPrice;
  const changePct = ((change / pd.startPrice) * 100).toFixed(2);
  const isUp = change >= 0;
  const clr = isUp ? '#00E676' : '#FF5252';

  document.getElementById(key + '-history-stats').innerHTML =
    '<div class="history-stat">' +
      '<div class="history-stat-label">涨跌幅</div>' +
      '<div class="history-stat-value" style="color:' + clr + '">' + (isUp ? '+' : '') + changePct + '%</div>' +
      '<div class="history-stat-sub" style="color:' + clr + '">' + (isUp ? '+' : '-') + '$' + Math.abs(change).toFixed(2) + '</div>' +
    '</div>' +
    '<div class="history-stat">' +
      '<div class="history-stat-label">' + pd.label + '前</div>' +
      '<div class="history-stat-value">' + fmt(pd.startPrice) + '</div>' +
      '<div class="history-stat-sub">起始价</div>' +
    '</div>' +
    '<div class="history-stat">' +
      '<div class="history-stat-label">区间最高</div>' +
      '<div class="history-stat-value" style="color:#00E676">' + fmt(pd.high) + '</div>' +
      '<div class="history-stat-sub">High</div>' +
    '</div>' +
    '<div class="history-stat">' +
      '<div class="history-stat-label">区间最低</div>' +
      '<div class="history-stat-value" style="color:#FF5252">' + fmt(pd.low) + '</div>' +
      '<div class="history-stat-sub">Low</div>' +
    '</div>';
}

function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent = now.toLocaleTimeString('zh-CN', { hour12: false });
  document.getElementById('date-display').textContent = now.toLocaleDateString('zh-CN');
}

// ========== Init ==========
updateClock();
updateCard('gold');
updateCard('oil');
initPeriodTabs('gold');
initPeriodTabs('oil');
renderPeriodHistory('gold');
renderPeriodHistory('oil');

setInterval(() => {
  tick(state.gold, 3.2);
  tick(state.oil, 0.1);
  updateCard('gold');
  updateCard('oil');
  renderPeriodHistory('gold');
  renderPeriodHistory('oil');
  showUpdateFlash();
}, 3000);

setInterval(updateClock, 1000);

// Handle resize (orientation change)
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    updateCard('gold');
    updateCard('oil');
    renderPeriodHistory('gold');
    renderPeriodHistory('oil');
  }, 200);
});
</script>
</body>
</html>
